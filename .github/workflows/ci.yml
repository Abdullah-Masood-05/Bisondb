name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu / GCC
            os: ubuntu-latest
            preset: debug
            cc: gcc
            cxx: g++
          - name: Ubuntu / Clang
            os: ubuntu-latest
            preset: debug
            cc: clang
            cxx: clang++
          - name: Windows / MSVC
            os: windows-latest
            preset: msvc
            build_preset: msvc-debug
            test_preset: msvc-debug

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset || matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.test_preset || matrix.preset }}

  lint:
    name: clang-format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src tests -name "*.cpp" -o -name "*.hpp" | \
          xargs clang-format --dry-run --Werror
